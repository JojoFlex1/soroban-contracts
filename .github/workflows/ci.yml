name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust / Soroban contracts ──────────────────────────────────────────────
  contracts:
    name: Contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml is picked up automatically by dtolnay/rust-toolchain
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Format ──────────────────────────────────────────────────────────
      - name: Check formatting
        run: cargo fmt --all -- --check

      # ── Clippy (wasm32 target, deny warnings) ───────────────────────────
      - name: Clippy
        run: >
          cargo clippy
          --all
          --target wasm32-unknown-unknown
          -- -D warnings

      # ── Build (wasm32) ───────────────────────────────────────────────────
      - name: Build contracts (wasm32)
        run: cargo build --all --target wasm32-unknown-unknown --release

      # ── Tests (native, testutils feature enabled via dev-deps) ──────────
      - name: Run contract tests
        run: cargo test --all

  # ── Next.js frontend ─────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
